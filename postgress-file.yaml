apiVersion: v1
kind: Pod
metadata:
  name: postgres-pod
spec:
  containers:
  - name: postgres
    image: postgres:15
    ports:
    - containerPort: 5432
    volumeMounts:
    - name: postgres-secret-volume
      mountPath: /etc/secrets
      readOnly: true
  volumes:
  - name: postgres-secret-volume
    secret:
      secretName: postgres-secret
