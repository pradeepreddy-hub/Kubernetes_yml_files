apiVersion: apps/v1
kind: Deployment
metadata:
  name: pod-anti-affinity-nginx
  namespace: default
spec:
  replicas: 4
  selector:
    matchLabels:
      my-pod: my-nginx
  template:
    metadata:
      labels:
        my-pod: my-nginx
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: env
                    operator: In
                    values:
                      - prod
                      - dev  

        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  my-pod: my-nginx
              topologyKey: kubernetes.io/hostname

      containers:
        - name: nginx
          image: nginx:1.29.5-otel
